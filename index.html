<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overwatch Customs Team Randomizer</title>
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #1b1035;
      --accent: #ff8a00;
      --accent-2: #ff3cac;
      --accent-3: #6a5cff;
      --text: #f4f7fb;
      --muted: #a8b0c3;
      --glass: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.16);
      --success: #6dffb3;
      --danger: #ff7171;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 60, 172, 0.22), transparent 26%),
        radial-gradient(circle at 80% 15%, rgba(106, 92, 255, 0.24), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(255, 138, 0, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::before {
      background: #ff3cac;
      top: -120px;
      left: -100px;
    }

    body::after {
      background: #6a5cff;
      right: -120px;
      bottom: -140px;
      animation-duration: 15s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(28px, 36px) scale(1.08); }
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(1100px, calc(100% - 32px));
      margin: 32px auto;
    }

    .hero, .panel, .team-card, footer {
      background: var(--glass);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .hero {
      border-radius: 30px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.12) 50%, transparent 80%);
      transform: translateX(-100%);
      animation: shimmer 6s linear infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .accent {
      background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtext {
      color: var(--muted);
      max-width: 760px;
      font-size: 1rem;
      line-height: 1.6;
      margin: 0;
    }

    .panel {
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 24px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.15rem;
      letter-spacing: 0.01em;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .mode-btn, .action-btn, .social-link {
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .mode-btn {
      background: rgba(255,255,255,0.06);
      padding: 14px 12px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 700;
    }

    .mode-btn:hover,
    .mode-btn.active {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      background: linear-gradient(135deg, rgba(255,138,0,0.18), rgba(106,92,255,0.18));
    }

    .helper {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.95rem;
    }

    .names-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .name-input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(11, 16, 32, 0.55);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 14px;
      outline: none;
      font-size: 0.98rem;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .name-input::placeholder {
      color: #8790a6;
    }

    .name-input:focus {
      border-color: rgba(255,255,255,0.38);
      transform: translateY(-1px);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .action-btn {
      border-radius: 16px;
      padding: 14px 18px;
      font-weight: 800;
      font-size: 0.96rem;
    }

    .primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 30px rgba(255, 60, 172, 0.24);
    }

    .secondary {
      background: rgba(255,255,255,0.06);
    }

    .action-btn:hover {
      transform: translateY(-2px) scale(1.01);
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .team-card {
      border-radius: 24px;
      padding: 18px;
      transform: translateY(20px) scale(0.97);
      opacity: 0;
    }

    .team-card.reveal {
      animation: cardReveal 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes cardReveal {
      0% { opacity: 0; transform: translateY(20px) scale(0.94) rotateX(12deg); }
      60% { opacity: 1; transform: translateY(-6px) scale(1.02); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .team-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .team-name {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .pill {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .team-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .team-list li {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team-list li::before {
      content: "✦";
      color: var(--accent);
      font-size: 0.85rem;
    }

    .dice-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .spark {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
      opacity: 0;
      animation: burst 900ms ease-out forwards;
      filter: blur(0.2px);
    }

    @keyframes burst {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.4);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.3);
      }
    }

    footer {
      border-radius: 22px;
      padding: 20px;
      margin-top: 26px;
    }

    .footer-line {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .credits {
      font-weight: 800;
      color: var(--text);
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .social-link {
      text-decoration: none;
      background: rgba(255,255,255,0.06);
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
    }

    .social-link:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.3);
    }

    @media (max-width: 640px) {
      .wrap { width: min(100% - 18px, 1100px); margin: 18px auto; }
      .hero, .panel, footer { padding: 18px; }
      .actions { flex-direction: column; align-items: stretch; }
      .action-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="dice-burst" id="diceBurst" aria-hidden="true"></div>

  <main class="wrap">
    <section class="hero">
      <h1><span class="accent">Overwatch Customs</span><br>Team Randomizer</h1>
    </section>

    <section class="panel">
      <h2 class="section-title">1. Select team size</h2>
      <div class="mode-grid" id="modeGrid">
        <button class="mode-btn" data-size="2">2v2</button>
        <button class="mode-btn" data-size="3">3v3</button>
        <button class="mode-btn" data-size="4">4v4</button>
        <button class="mode-btn" data-size="5">5v5</button>
        <button class="mode-btn" data-size="6">6v6</button>
      </div>
      <p class="helper" id="helperText">Choose a mode to generate the correct number of name fields.</p>

      <div class="names-grid" id="namesGrid"></div>

      <div class="actions">
        <button class="action-btn primary" id="randomizeBtn">Randomize Teams</button>
        <button class="action-btn secondary" id="resetBtn">Reset</button>
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="teams-grid" id="teamsGrid"></section>

    <footer>
      <p class="footer-line credits">Created by Gavin Couch</p>
      <p class="footer-line">For recreational use only. This randomizer is intended for casual custom matches and entertainment.</p>
      <div class="socials">
        <a class="social-link" href="https://discord.com/users/redonimo" target="_blank" rel="noreferrer">Discord: redonimo</a>
        <a class="social-link" href="https://github.com/gavincouch" target="_blank" rel="noreferrer">GitHub: gavincouch</a>
      </div>
    </footer>
  </main>

  <script>
    const modeButtons = document.querySelectorAll('.mode-btn');
    const namesGrid = document.getElementById('namesGrid');
    const teamsGrid = document.getElementById('teamsGrid');
    const helperText = document.getElementById('helperText');
    const status = document.getElementById('status');
    const randomizeBtn = document.getElementById('randomizeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const diceBurst = document.getElementById('diceBurst');

    let teamSize = null;

    function setStatus(message, type = '') {
      status.textContent = message;
      status.className = 'status';
      if (type) status.classList.add(type);
    }

    function buildInputs(size) {
      namesGrid.innerHTML = '';
      teamsGrid.innerHTML = '';
      setStatus('');
      const totalPlayers = size * 2;
      helperText.textContent = `Enter ${totalPlayers} player names for ${size}v${size}.`;

      for (let i = 1; i <= totalPlayers; i++) {
        const input = document.createElement('input');
        input.className = 'name-input';
        input.type = 'text';
        input.placeholder = `Player ${i}`;
        input.setAttribute('aria-label', `Player ${i}`);
        namesGrid.appendChild(input);
      }
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function burstAnimation() {
      diceBurst.innerHTML = '';
      const count = 28;
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      for (let i = 0; i < count; i++) {
        const spark = document.createElement('span');
        spark.className = 'spark';
        const angle = (Math.PI * 2 * i) / count;
        const distance = 90 + Math.random() * 180;
        const x = Math.cos(angle) * distance + 'px';
        const y = Math.sin(angle) * distance + 'px';
        spark.style.left = centerX + 'px';
        spark.style.top = centerY + 'px';
        spark.style.setProperty('--x', x);
        spark.style.setProperty('--y', y);
        spark.style.animationDelay = `${Math.random() * 120}ms`;
        diceBurst.appendChild(spark);
      }

      setTimeout(() => {
        diceBurst.innerHTML = '';
      }, 1100);
    }

    function renderTeams(teamA, teamB, size) {
      teamsGrid.innerHTML = '';
      const teams = [
        { title: 'Team 1', players: teamA },
        { title: 'Team 2', players: teamB }
      ];

      teams.forEach((team, index) => {
        const card = document.createElement('article');
        card.className = 'team-card';
        card.innerHTML = `
          <div class="team-header">
            <h3 class="team-name">${team.title}</h3>
            <span class="pill">${size} players</span>
          </div>
          <ul class="team-list">
            ${team.players.map(name => `<li>${name}</li>`).join('')}
          </ul>
        `;
        teamsGrid.appendChild(card);
        setTimeout(() => card.classList.add('reveal'), 150 + index * 180);
      });
    }

    modeButtons.forEach(button => {
      button.addEventListener('click', () => {
        modeButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        teamSize = Number(button.dataset.size);
        buildInputs(teamSize);
      });
    });

    randomizeBtn.addEventListener('click', () => {
      if (!teamSize) {
        setStatus('Select a team size first.', 'error');
        return;
      }

      const names = [...document.querySelectorAll('.name-input')]
        .map(input => input.value.trim())
        .filter(Boolean);

      const expected = teamSize * 2;
      const uniqueNames = new Set(names.map(name => name.toLowerCase()));

      if (names.length !== expected) {
        setStatus(`You need exactly ${expected} names for ${teamSize}v${teamSize}.`, 'error');
        return;
      }

      if (uniqueNames.size !== names.length) {
        setStatus('Each player name should be unique.', 'error');
        return;
      }

      const randomized = shuffle(names);
      const teamA = randomized.slice(0, teamSize);
      const teamB = randomized.slice(teamSize);

      burstAnimation();
      renderTeams(teamA, teamB, teamSize);
      setStatus('Teams randomized successfully.', 'success');
    });

    resetBtn.addEventListener('click', () => {
      teamSize = null;
      modeButtons.forEach(btn => btn.classList.remove('active'));
      namesGrid.innerHTML = '';
      teamsGrid.innerHTML = '';
      helperText.textContent = 'Choose a mode to generate the correct number of name fields.';
      setStatus('Reset complete.', 'success');
    });
  </script>
</body>
</html>
